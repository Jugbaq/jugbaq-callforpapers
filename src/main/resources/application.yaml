spring:
  application:
    name: callforpapers

  datasource:
    url: jdbc:postgresql://localhost:5432/callforpapers
    username: cfp
    password: cfp_dev_pass
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate    # Flyway es quien crea el schema, nunca Hibernate
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: true
    open-in-view: false     # importante con Vaadin

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  mail:
    host: localhost
    port: 1025
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
            scope: openid, email, profile
          github:
            client-id: ${GITHUB_CLIENT_ID:placeholder}
            client-secret: ${GITHUB_CLIENT_SECRET:placeholder}
            scope: user:email, read:user
        provider:
          github:
            user-info-uri: https://api.github.com/user

server:
  port: 8080
  error:
    include-message: always

vaadin:
  launch-browser: false
  productionMode: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

cfp:
  mail:
    from: noreply@jugbaq.dev
  base-url: http://localhost:8080

logging:
  level:
    com.jugbaq.cfp: DEBUG
    org.hibernate.SQL: DEBUG
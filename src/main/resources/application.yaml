spring:
  application:
    name: callforpapers

  datasource:
    url: jdbc:postgresql://localhost:5432/callforpapers
    username: cfp
    password: cfp_dev_pass
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate    # Flyway es quien crea el schema, nunca Hibernate
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: true
    open-in-view: false     # importante con Vaadin

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  mail:
    host: localhost
    port: 1025
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

server:
  port: 8080
  error:
    include-message: always

vaadin:
  launch-browser: false
  productionMode: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.jugbaq.cfp: DEBUG
    org.hibernate.SQL: DEBUG